<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="Dimasi Automobile Emblem">
  <defs>
    <linearGradient id="emGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff8a00"/>
      <stop offset=".55" stop-color="#ff4d00"/>
      <stop offset="1" stop-color="#ff2d00"/>
    </linearGradient>
    <linearGradient id="emBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1d212b"/>
      <stop offset="1" stop-color="#0b0d12"/>
    </linearGradient>
    <linearGradient id="emShine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".10"/>
      <stop offset=".4" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Badge -->
  <rect x="6.5" y="6.5" width="107" height="107" rx="30" fill="url(#emBody)" stroke="url(#emGrad)" stroke-width="3.5"/>
  <rect x="6.5" y="6.5" width="107" height="107" rx="30" fill="url(#emShine)"/>

  <!-- Road line -->
  <rect x="24" y="84.5" width="72" height="3.4" rx="1.7" fill="url(#emGrad)" opacity=".55"/>
  <rect x="52" y="84.5" width="16" height="3.4" rx="1.7" fill="#0b0d12" opacity=".9"/>

  <!-- Car body -->
  <path d="M26,73 C26,68 29,65.5 34,65 L42,65
           C46,56.5 52,51 62,51 L73,51
           C81,51 85,58 89,65 L93,66.5
           C96,67.5 96,71 95,73 L88,73
           A9 9 0 0 0 70,73 L50,73
           A9 9 0 0 0 32,73 Z" fill="url(#emGrad)"/>

  <!-- Cabin glass -->
  <path d="M47,64 C50,57.5 55,53.8 62,53.8 L70,53.8 C75,53.8 79,57.6 82.5,64 Z" fill="#0b0d12" opacity=".92"/>
  <!-- B-pillar -->
  <rect x="63.4" y="53.8" width="2.2" height="10.2" fill="url(#emBody)" opacity=".9"/>

  <!-- Headlight -->
  <circle cx="30.5" cy="68.5" r="2.1" fill="#ffe6b8"/>

  <!-- Wheels -->
  <g>
    <circle cx="41" cy="73" r="9" fill="url(#emGrad)"/>
    <circle cx="41" cy="73" r="4.2" fill="#0b0d12"/>
    <circle cx="41" cy="73" r="1.7" fill="url(#emGrad)"/>
  </g>
  <g>
    <circle cx="79" cy="73" r="9" fill="url(#emGrad)"/>
    <circle cx="79" cy="73" r="4.2" fill="#0b0d12"/>
    <circle cx="79" cy="73" r="1.7" fill="url(#emGrad)"/>
  </g>
</svg>
