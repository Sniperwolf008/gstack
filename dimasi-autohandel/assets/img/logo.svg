<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 320" role="img" aria-label="Dimasi Automobile">
  <defs>
    <linearGradient id="lgRim" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#bfdbfe"/>
      <stop offset=".5" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="lgBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a2740"/>
      <stop offset="1" stop-color="#080c16"/>
    </linearGradient>
    <linearGradient id="lgCar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#dbeafe"/>
      <stop offset=".45" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="lgGloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".22"/>
      <stop offset=".55" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="lgInner" cx="50%" cy="34%" r="62%">
      <stop offset="0" stop-color="#21345a" stop-opacity=".9"/>
      <stop offset="1" stop-color="#080c16" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="lgText" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#93c5fd"/>
      <stop offset=".55" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>

  <!-- Emblem -->
  <g transform="translate(75,8) scale(1.25)">
    <rect x="6.5" y="6.5" width="107" height="107" rx="30" fill="url(#lgBody)" stroke="url(#lgRim)" stroke-width="3.5"/>
    <rect x="9" y="9" width="102" height="102" rx="27" fill="url(#lgInner)"/>
    <rect x="11" y="10" width="98" height="52" rx="26" fill="url(#lgGloss)"/>
    <rect x="24" y="84.5" width="72" height="3.4" rx="1.7" fill="url(#lgRim)" opacity=".6"/>
    <rect x="52" y="84.5" width="16" height="3.4" rx="1.7" fill="#080c16" opacity=".9"/>
    <path d="M26,73 C26,68 29,65.5 34,65 L42,65
             C46,56.5 52,51 62,51 L73,51
             C81,51 85,58 89,65 L93,66.5
             C96,67.5 96,71 95,73 L88,73
             A9 9 0 0 0 70,73 L50,73
             A9 9 0 0 0 32,73 Z" fill="url(#lgCar)"/>
    <path d="M42.5,64.4 C46.4,56.6 52,51.8 62,51.8 L73,51.8 C79.5,51.8 83.4,56.4 86,61"
          fill="none" stroke="#eaf2ff" stroke-opacity=".7" stroke-width="1.3" stroke-linecap="round"/>
    <path d="M47,64 C50,57.5 55,53.8 62,53.8 L70,53.8 C75,53.8 79,57.6 82.5,64 Z" fill="#0a1426" opacity=".95"/>
    <rect x="63.4" y="53.8" width="2.2" height="10.2" fill="url(#lgBody)" opacity=".9"/>
    <circle cx="30.5" cy="68.5" r="2.1" fill="#dbeafe"/>
    <circle cx="41" cy="73" r="9" fill="url(#lgCar)"/>
    <circle cx="41" cy="73" r="4.2" fill="#0a1426"/>
    <circle cx="41" cy="73" r="1.7" fill="#bfdbfe"/>
    <circle cx="79" cy="73" r="9" fill="url(#lgCar)"/>
    <circle cx="79" cy="73" r="4.2" fill="#0a1426"/>
    <circle cx="79" cy="73" r="1.7" fill="#bfdbfe"/>
  </g>

  <!-- Wordmark -->
  <text x="150" y="244" text-anchor="middle"
        font-family="'Space Grotesk','Trebuchet MS',Verdana,Arial,sans-serif"
        font-size="60" font-weight="700" letter-spacing="1" fill="#f4f7fc">DIMASI</text>
  <text x="150" y="285" text-anchor="middle"
        font-family="'Space Grotesk','Trebuchet MS',Verdana,Arial,sans-serif"
        font-size="25" font-weight="700" letter-spacing="9.5" fill="url(#lgText)">AUTOMOBILE</text>
</svg>
