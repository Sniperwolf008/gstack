<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 250" role="img" aria-label="AURION Automobile">
  <defs>
    <linearGradient id="lgA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#93c5fd"/>
      <stop offset=".5" stop-color="#2f6fe0"/>
      <stop offset="1" stop-color="#173e9e"/>
    </linearGradient>
    <linearGradient id="lgE" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d7e0ee"/>
      <stop offset=".55" stop-color="#9aa8bd"/>
      <stop offset="1" stop-color="#6f7e95"/>
    </linearGradient>
    <linearGradient id="lgWord" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#93c5fd"/>
      <stop offset=".5" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>

  <!-- AE monogram -->
  <g transform="translate(104,14)">
    <path d="M54,8 L100,98 L8,98 Z M54,44 L76,98 L32,98 Z" fill="url(#lgA)" fill-rule="evenodd"/>
    <path d="M43.4,70 L64.6,70 L69.5,82 L38.5,82 Z" fill="url(#lgA)"/>
    <path d="M66,32 L78,20 L140,20 L128,32 Z" fill="url(#lgE)"/>
    <path d="M82,62 L94,50 L134,50 L122,62 Z" fill="url(#lgE)"/>
    <path d="M96,92 L108,80 L140,80 L128,92 Z" fill="url(#lgE)"/>
  </g>

  <!-- Wordmark -->
  <text x="180" y="190" text-anchor="middle"
        font-family="'Space Grotesk','Trebuchet MS',Verdana,Arial,sans-serif"
        font-size="48" font-weight="600" letter-spacing="13" fill="url(#lgWord)">AURION</text>

  <!-- AUTOMOBILE with flanking lines -->
  <line x1="44" y1="222" x2="118" y2="222" stroke="#3b82f6" stroke-width="1.6"/>
  <line x1="242" y1="222" x2="316" y2="222" stroke="#3b82f6" stroke-width="1.6"/>
  <text x="180" y="227" text-anchor="middle"
        font-family="'Space Grotesk','Trebuchet MS',Verdana,Arial,sans-serif"
        font-size="15" font-weight="500" letter-spacing="6" fill="#9aa8bd">AUTOMOBILE</text>
</svg>
