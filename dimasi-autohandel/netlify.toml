# Netlify-Konfiguration für Dimasi Automobile (statische Seite, kein Build-Schritt)
# Beim Deploy aus diesem Ordner ist die Seite das Veröffentlichungsverzeichnis.
[build]
  publish = "."
  command = ""

# Sicherheits- und Caching-Header
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    # HTTPS erzwingen (Schutz vor SSL-Strip beim Erstbesuch).
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    # Ungenutzte Browser-Funktionen fuer diese Origin abschalten.
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()"
    Cross-Origin-Opener-Policy = "same-origin"
    # Inhalts-Quellen-Whitelist (Defense-in-Depth gegen Injection/Clickjacking).
    # script-src ohne 'unsafe-inline' moeglich, weil es keine Inline-Skripte gibt.
    # Google-Fonts-Domains noetig, solange die Schriften extern geladen werden.
    Content-Security-Policy = "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://formsubmit.co; form-action 'self' https://formsubmit.co; frame-ancestors 'self'; base-uri 'self'; object-src 'none'; upgrade-insecure-requests"
    # HTML/CSS/JS immer beim Browser revalidieren, damit neue Deploys
    # sofort sichtbar sind. Langlebige Bilder (/assets/*) werden unten
    # davon ausgenommen.
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Interne Build-/Ops-Dateien nicht oeffentlich ausliefern (force = true
# ueberschreibt das Ausliefern der echten Datei und gibt 404 zurueck).
[[redirects]]
  from = "/DEPLOY.md"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/README.md"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/netlify.toml"
  to = "/404.html"
  status = 404
  force = true
