# Netlify-Konfiguration für Dimasi Garage (statische Seite, kein Build-Schritt)
# Beim Deploy aus diesem Ordner ist die Seite das Veröffentlichungsverzeichnis.
[build]
  publish = "."
  command = ""

# Sicherheits- und Caching-Header
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
