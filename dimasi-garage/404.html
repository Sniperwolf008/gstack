<!DOCTYPE html>
<html lang="de-CH">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Seite nicht gefunden – DimasiGarage</title>
  <meta name="robots" content="noindex, follow" />
  <meta name="theme-color" content="#0a0b0f" />
  <link rel="icon" type="image/png" href="assets/img/favicon-dg.png" />
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    .nf { min-height: 80vh; display: grid; place-items: center; text-align: center; padding: 2rem; }
    .nf__code { font-family: var(--font-head, system-ui); font-size: clamp(4rem, 18vw, 9rem); line-height: 1;
      background: var(--gradient, linear-gradient(135deg, #ff7a00, #ff3d00)); -webkit-background-clip: text;
      background-clip: text; -webkit-text-fill-color: transparent; }
    .nf img { width: 110px; height: auto; margin-bottom: 1.5rem; }
    .nf p { color: var(--text-muted, #9aa0ad); margin: .8rem 0 1.6rem; }
  </style>
</head>
<body>
  <main class="nf">
    <div>
      <img src="assets/img/logo.png" width="568" height="680" alt="Dimasi Garage" />
      <div class="nf__code">404</div>
      <p>Diese Seite gibt es nicht (mehr).</p>
      <a class="btn btn--primary btn--large" href="/">Zur Startseite</a>
    </div>
  </main>
</body>
</html>
