# Netlify-Konfiguration für Dimasi Garage (statische Seite, kein Build-Schritt)
# Beim Deploy aus diesem Ordner ist die Seite das Veröffentlichungsverzeichnis.
[build]
  publish = "."
  command = ""

# Sicherheits- und Caching-Header
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    # HTML/CSS/JS immer beim Browser revalidieren, damit neue Deploys
    # sofort sichtbar sind. Langlebige Bilder (/assets/*) werden unten
    # davon ausgenommen. Zusammen mit ?v=<commit> an CSS/JS laedt selbst
    # iOS-Safari nach jedem Deploy frisch.
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
